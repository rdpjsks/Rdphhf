name: Ares Persistent RDP – Ultimate V4

on:
  workflow_dispatch:
    inputs:
      ts_authkey:
        description: "Tailscale Auth Key"
        required: true
        type: string
  schedule:
    - cron: '0 */5 * * *' # Auto-restart every 5 hours for 24/7 feel

jobs:
  ares-rdp:
    runs-on: windows-latest
    timeout-minutes: 350 # Maximize Azure/GitHub runner time

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ares Branding & User Setup
        shell: powershell
        run: |
          Write-Host "--- APPLYING ARES BRANDING ---" -ForegroundColor Cyan
          # Fix: Using high-complexity password to avoid InvalidPasswordException
          $sec = ConvertTo-SecureString "Ares_Cloud_Admin!99#X" -AsPlainText -Force
          if (-not (Get-LocalUser -Name "Ares" -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name "Ares" -Password $sec -AccountNeverExpires -Description "Ares Custom RDP Admin"
            Add-LocalGroupMember Administrators "Ares"
          }
          # Create folders for persistence
          New-Item -Path "C:\Users\Ares\AppData\Local\Google\Chrome\User Data" -ItemType Directory -Force
          New-Item -Path "C:\Ares_Persistent" -ItemType Directory -Force
          New-Item -Path "C:\Users\Ares\Downloads" -ItemType Directory -Force
          
          # Machine Branding
          Rename-Computer -NewName "Ares-Cloud-PC" -Force -ErrorAction SilentlyContinue

      - name: Restore Ares Session Data
        uses: actions/cache/restore@v4
        with:
          path: |
            C:\Users\Ares\AppData\Local\Google\Chrome\User Data
            C:\Users\Ares\Downloads
            C:\Ares_Persistent
          key: ares-v4-${{ github.run_id }}
          restore-keys: |
            ares-v4-

      - name: Install Chrome & Tools
        shell: powershell
        run: |
          Write-Host "Installing Chrome..." -ForegroundColor Cyan
          $Path = "$env:TEMP\chrome_installer.exe"
          Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/375.126/chrome_installer.exe" -OutFile $Path
          Start-Process -FilePath $Path -ArgumentList "/silent", "/install" -Wait
          Write-Host "Chrome Installed." -ForegroundColor Green

      - name: Start Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "$env:TEMP\tailscale.exe"
          Start-Process "$env:TEMP\tailscale.exe" -ArgumentList "/quiet","/norestart" -Wait
          # Trimming input to avoid "Invalid Key" error
          $Key = "${{ github.event.inputs.ts_authkey }}".Trim()
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey "$Key" --hostname "Ares-RDP" --accept-dns=false

      - name: Enable RDP Access
        shell: powershell
        run: |
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 1

      - name: Keep-Alive & Active Session
        shell: powershell
        run: |
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 | Select-Object -First 1
          Write-Host "====================================" -ForegroundColor Cyan
          Write-Host "       ARES RDP IS ONLINE           " -ForegroundColor White -BackgroundColor Blue
          Write-Host "====================================" -ForegroundColor Cyan
          Write-Host " IP: $ip" -ForegroundColor Yellow
          Write-Host " USER: Ares" -ForegroundColor Green
          Write-Host " PASS: Ares_Cloud_Admin!99#X" -ForegroundColor Green
          Write-Host "====================================" -ForegroundColor Cyan
          
          try {
            Start-Sleep -Seconds 18000 # 5 Hours
          } finally {
            Write-Host "Session rotation starting... saving persistent data."
          }

      - name: Save Persistent Data Always
        if: always() # This ensures data saves even if the job is cancelled or timed out
        uses: actions/cache/save@v4
        with:
          path: |
            C:\Users\Ares\AppData\Local\Google\Chrome\User Data
            C:\Users\Ares\Downloads
            C:\Ares_Persistent
          key: ares-v4-${{ github.run_id }}-${{ github.run_attempt }}

